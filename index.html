<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>礼尚往来</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5b7b94">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-body: #e8edf2;
      --bg-container: #ffffff;
      --bg-card: #f6f8fa;
      --bg-input: #ffffff;
      --text-primary: #2c3e50;
      --text-secondary: #4a6274;
      --text-label: #4a6274;
      --text-muted: #7c8b9a;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 12px 28px rgba(0,0,0,0.06);
      --input-border: #e5e9ef;
      --accent: #5b7b94;
      --accent-light: #7a9eb1;
      --out-color: #c37b6d;
      --in-color: #5f9b8c;
      --tag-relation-bg: #eef2f5;
      --tag-relation-text: #6b8299;
      --tag-out-bg: #fbe8e4;
      --tag-out-text: #b65c4a;
      --tag-in-bg: #dff0e8;
      --tag-in-text: #3d7563;
      --chart-color-1: #7a9eb1; --chart-color-2: #8fb3a5; --chart-color-3: #c09a7a; --chart-color-4: #dba0a8;
      --chart-color-5: #a89bcc; --chart-color-6: #7ab5ef; --chart-color-7: #b6a19e; --chart-color-8: #73c7a7;
      --chart-color-9: #d4bc94; --chart-color-10: #c4a6ff;
    }

    body[data-theme="dark"] {
      --bg-body: #151a1f; --bg-container: rgba(25,30,35,0.9); --bg-card: rgba(35,40,45,0.8); --bg-input: rgba(45,50,55,0.9);
      --text-primary: #e0e5ea; --text-secondary: #c0c7cf; --text-label: #b0b8c1; --text-muted: #8b929a;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3); --shadow-md: 0 12px 28px rgba(0,0,0,0.4);
      --input-border: rgba(255,255,255,0.08);
      --accent: #7a9eb1; --accent-light: #9bb7c7; --out-color: #f5a0a0; --in-color: #8cc9a8;
      --tag-relation-bg: #2a3540; --tag-relation-text: #8a9fb0;
      --tag-out-bg: #3e2c2a; --tag-out-text: #dba89e;
      --tag-in-bg: #2a3e38; --tag-in-text: #9bc4b3;
      --chart-color-1: #7eb8c9; --chart-color-2: #8cc9a8; --chart-color-3: #d4a88c; --chart-color-4: #e0b0b8;
      --chart-color-5: #b8a8d8; --chart-color-6: #8cc9f8; --chart-color-7: #c8b8b4; --chart-color-8: #7ed4b0;
      --chart-color-9: #e0ccaa; --chart-color-10: #d4b8ff;
    }
    body[data-theme="forest"] {
      --bg-body: #eef5f2; --bg-container: #ffffff; --bg-card: #f4faf6; --bg-input: #ffffff;
      --text-primary: #2a4038; --text-secondary: #4a6058; --text-label: #4a6058; --text-muted: #7b8f85;
      --shadow-sm: 0 2px 8px rgba(80,120,100,0.08); --shadow-md: 0 12px 28px rgba(80,120,100,0.1);
      --input-border: #d0e0d8;
      --accent: #5a8a6a; --accent-light: #7aaa85; --out-color: #b8645a; --in-color: #5a8a6a;
      --tag-relation-bg: #eef5f1; --tag-relation-text: #5a7a66;
      --tag-out-bg: #fce8e5; --tag-out-text: #b85a50;
      --tag-in-bg: #dff0e5; --tag-in-text: #3d7553;
      --chart-color-1: #5a8a6a; --chart-color-2: #7aaa85; --chart-color-3: #8fb3a5; --chart-color-4: #c47a8a;
      --chart-color-5: #7ab5ef; --chart-color-6: #a89bcc; --chart-color-7: #c09a7a; --chart-color-8: #73c7a7;
      --chart-color-9: #d4bc94; --chart-color-10: #b6a19e;
    }
    body[data-theme="blossom"] {
      --bg-body: #fdf4f5; --bg-container: #ffffff; --bg-card: #fff7f8; --bg-input: #ffffff;
      --text-primary: #4d3840; --text-secondary: #6a5258; --text-label: #6a5258; --text-muted: #9b848a;
      --shadow-sm: 0 2px 8px rgba(180,130,140,0.1); --shadow-md: 0 12px 28px rgba(180,130,140,0.12);
      --input-border: #e8d5d8;
      --accent: #c47a8a; --accent-light: #dba0a8; --out-color: #c4706a; --in-color: #7a9e7a;
      --tag-relation-bg: #fdf6f7; --tag-relation-text: #8a6a70;
      --tag-out-bg: #fce8e6; --tag-out-text: #b8665a;
      --tag-in-bg: #e5f2e8; --tag-in-text: #4d7a55;
      --chart-color-1: #c47a8a; --chart-color-2: #dba0a8; --chart-color-3: #e0b0b8; --chart-color-4: #8fb3a5;
      --chart-color-5: #7ab5ef; --chart-color-6: #a89bcc; --chart-color-7: #c09a7a; --chart-color-8: #73c7a7;
      --chart-color-9: #d4bc94; --chart-color-10: #7a9eb1;
    }
    body[data-theme="caramel"] {
      --bg-body: #f2ece4; --bg-container: #ffffff; --bg-card: #f9f4ec; --bg-input: #ffffff;
      --text-primary: #3e3028; --text-secondary: #5e4c3e; --text-label: #5e4c3e; --text-muted: #8c7a68;
      --shadow-sm: 0 2px 8px rgba(140,110,80,0.1); --shadow-md: 0 12px 28px rgba(140,110,80,0.12);
      --input-border: #e0d3c2;
      --accent: #a0785a; --accent-light: #c09a7a; --out-color: #b0705a; --in-color: #6b9e7a;
      --tag-relation-bg: #f7f2eb; --tag-relation-text: #8a6e5a;
      --tag-out-bg: #fae5e0; --tag-out-text: #b06555;
      --tag-in-bg: #e0f0e5; --tag-in-text: #4a7655;
      --chart-color-1: #a0785a; --chart-color-2: #c09a7a; --chart-color-3: #d4a88c; --chart-color-4: #b0705a;
      --chart-color-5: #8fb3a5; --chart-color-6: #7ab5ef; --chart-color-7: #a89bcc; --chart-color-8: #6b9e7a;
      --chart-color-9: #d4bc94; --chart-color-10: #b6a19e;
    }
    body[data-theme="purple"] {
      --bg-body: #f4f0f8; --bg-container: #ffffff; --bg-card: #f9f5fc; --bg-input: #ffffff;
      --text-primary: #3a3347; --text-secondary: #5a5268; --text-label: #5a5268; --text-muted: #8b8298;
      --shadow-sm: 0 2px 8px rgba(130,120,150,0.1); --shadow-md: 0 12px 28px rgba(130,120,150,0.12);
      --input-border: #e0dae8;
      --accent: #8b7aaa; --accent-light: #a89bcc; --out-color: #b8706a; --in-color: #7a9e7a;
      --tag-relation-bg: #f6f2fa; --tag-relation-text: #6e5a8a;
      --tag-out-bg: #fce8e6; --tag-out-text: #b8665a;
      --tag-in-bg: #e5f2e8; --tag-in-text: #4d7a55;
      --chart-color-1: #8b7aaa; --chart-color-2: #a89bcc; --chart-color-3: #c4a6ff; --chart-color-4: #7ab5ef;
      --chart-color-5: #8fb3a5; --chart-color-6: #c09a7a; --chart-color-7: #dba0a8; --chart-color-8: #73c7a7;
      --chart-color-9: #d4bc94; --chart-color-10: #b6a19e;
    }
    body[data-theme="sky"] {
      --bg-body: #eaf2fa; --bg-container: #ffffff; --bg-card: #f2f7fc; --bg-input: #ffffff;
      --text-primary: #2a3a4d; --text-secondary: #4a5d74; --text-label: #4a5d74; --text-muted: #7a8b9e;
      --shadow-sm: 0 2px 8px rgba(80,120,180,0.08); --shadow-md: 0 12px 28px rgba(80,120,180,0.1);
      --input-border: #d4e0f0;
      --accent: #4a90d9; --accent-light: #7ab5ef; --out-color: #c37b6d; --in-color: #5f9b8c;
      --tag-relation-bg: #eef4fa; --tag-relation-text: #4a7099;
      --tag-out-bg: #fbe8e4; --tag-out-text: #b65c4a;
      --tag-in-bg: #dff0e8; --tag-in-text: #3d7563;
      --chart-color-1: #4a90d9; --chart-color-2: #7ab5ef; --chart-color-3: #8cc9f8; --chart-color-4: #8fb3a5;
      --chart-color-5: #a89bcc; --chart-color-6: #c09a7a; --chart-color-7: #dba0a8; --chart-color-8: #73c7a7;
      --chart-color-9: #d4bc94; --chart-color-10: #b6a19e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px 12px;
      padding-bottom: 80px;
      transition: background 0.3s, color 0.3s;
    }

    .app-container {
      max-width: 420px;
      width: 100%;
      background: var(--bg-container);
      border-radius: 28px;
      padding: 20px 16px 20px;
      box-shadow: var(--shadow-md);
      transition: background 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }
    .header h1 .sub-brand { font-size: 14px; font-weight: 400; letter-spacing: 1px; }
    .header-controls { display: flex; gap: 8px; align-items: center; }
    .theme-toggle, .style-select-btn {
      background: var(--bg-card); backdrop-filter: blur(8px);
      border: none; width: 40px; height: 40px; border-radius: 50%;
      font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm); transition: background 0.3s, transform 0.2s; color: var(--text-primary);
    }
    .style-select-btn { font-size: 18px; }
    .theme-toggle:active, .style-select-btn:active { transform: scale(0.9); }

    .style-panel {
      position: absolute; top: 56px; right: 16px;
      background: var(--bg-container); border-radius: 18px; padding: 10px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12); z-index: 50;
      display: none; grid-template-columns: repeat(3, 1fr); gap: 6px; border: 1px solid var(--input-border);
    }
    .style-panel.show { display: grid; }
    .style-option {
      width: 50px; height: 50px; border-radius: 14px; cursor: pointer;
      border: 2px solid transparent; transition: border 0.2s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .style-option.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }

    .page-content {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .page-content.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .recent-section { margin-bottom: 16px; }
    .recent-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .recent-list { display: flex; flex-direction: column; gap: 6px; }
    .recent-item {
      background: var(--bg-card); border-radius: 14px; padding: 12px 14px;
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      box-shadow: var(--shadow-sm); transition: background 0.2s;
    }
    .recent-item:active { background: var(--bg-input); }
    .recent-item .recent-icon { font-size: 24px; }
    .recent-item .recent-info { flex: 1; }
    .recent-item .recent-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .recent-item .recent-meta { font-size: 11px; color: var(--text-muted); }
    .recent-item .recent-amount { font-weight: 700; font-size: 15px; }
    .recent-item .recent-amount.out { color: var(--out-color); }
    .recent-item .recent-amount.in { color: var(--in-color); }

    .reminder-container { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
    .reminder-bar {
      background: #fdf6ec; border-radius: 10px; padding: 8px 12px;
      font-size: 12px; color: #8a6d3b; display: flex; align-items: center; gap: 6px;
      border-left: 3px solid #f0ad4e; cursor: pointer; transition: background 0.2s;
      justify-content: space-between;
    }
    .reminder-bar .reminder-text { flex: 1; }
    .close-reminder { background: none; border: none; font-size: 16px; cursor: pointer; color: #b0a080; padding: 0 2px; }

    .form-card { background: var(--bg-card); border-radius: 20px; padding: 16px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
    .form-group { position: relative; margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text-label); margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 11px 14px; border: 1px solid var(--input-border); border-radius: 14px; font-size: 14px; background: var(--bg-input); color: var(--text-primary); outline: none; }
    .row { display: flex; gap: 10px; }
    .row .form-group { flex: 1; margin-bottom: 0; }

    .type-switch {
      display: flex; background: var(--bg-input); border-radius: 14px; height: 44px;
      border: 1px solid var(--input-border); overflow: hidden; width: 100%;
    }
    .type-switch-btn {
      flex: 1; padding: 10px 12px; border: none; background: transparent;
      font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text-secondary); transition: 0.2s;
      text-align: center;
    }
    .type-switch-btn.active { background: var(--accent); color: white; }

    #advancedFields { display: none; }
    #advancedFields.show { display: block; }
    #advancedFields .form-group { margin-bottom: 14px; }
    .btn-expand-more { background: none; border: none; color: var(--accent); font-size: 12px; font-weight: 600; margin-top: 10px; cursor: pointer; width: 100%; text-align: center; }

    .quick-amounts { display: flex; gap: 6px; margin-top: 6px; }
    .quick-amount { flex: 1; background: var(--bg-input); border: 1px solid var(--input-border); padding: 7px 0; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; }

    .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: white; border: none; padding: 13px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px; }

    .suggest-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--bg-input); border-radius: 14px; max-height: 160px; overflow-y: auto; z-index: 10; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 4px 0; border: 1px solid var(--input-border); }
    .suggest-list.show { display: block; }
    .suggest-item { padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; font-size: 14px; }
    .suggest-item:hover { background: rgba(0,0,0,0.02); }
    .suggest-relation { font-size: 12px; color: var(--text-muted); }

    .search-bar { margin-bottom: 16px; }
    .search-bar input {
      width: 100%; padding: 12px 16px; border: 1px solid var(--input-border); border-radius: 16px;
      font-size: 14px; background: var(--bg-input); box-shadow: var(--shadow-sm); color: var(--text-primary);
      transition: all 0.25s ease;
    }
    .search-bar input:focus { outline: none; border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--text-muted); }

    .list-header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .list-header .title-row { display: flex; justify-content: space-between; align-items: center; }
    .list-title { font-size: 14px; font-weight: 700; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
    .list-title::before { content: ''; display: inline-block; width: 3px; height: 16px; background: var(--accent); border-radius: 2px; }
    .list-controls { display: flex; gap: 8px; align-items: center; }
    .list-controls select {
      flex: 1; min-width: 0; height: 34px; padding: 0 10px;
      border-radius: 14px; border: 1px solid var(--input-border);
      background: var(--bg-input); font-size: 12px; color: var(--text-primary);
      -webkit-appearance: none; appearance: none;
    }
    .sort-btn {
      flex: 1; min-width: 0; height: 34px; padding: 0 10px;
      border-radius: 14px; border: 1px solid var(--input-border);
      background: var(--bg-input); font-size: 12px; font-weight: 600;
      cursor: pointer; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
    }
    .sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .pending-filter-wrapper { position: relative; flex: 1; min-width: 0; }
    .filter-icon-btn {
      width: 100%; height: 34px; padding: 0 10px;
      border-radius: 14px; border: 1px solid var(--input-border);
      background: var(--bg-input); font-size: 12px; font-weight: 600;
      cursor: pointer; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center; gap: 2px;
    }
    .filter-icon-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .filter-dropdown {
      position: absolute; top: calc(100% + 4px); right: 0;
      background: var(--bg-container); border-radius: 12px; padding: 4px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12); z-index: 20;
      display: none; min-width: 130px; border: 1px solid var(--input-border);
    }
    .filter-dropdown.show { display: block; }
    .filter-dropdown-item { padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; white-space: nowrap; }
    .filter-dropdown-item:hover { background: var(--bg-card); }

    .year-collapse { margin-bottom: 10px; }
    .year-collapse-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--bg-card); border-radius: 12px;
      cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-secondary);
      user-select: none;
    }
    .year-collapse-header .arrow { transition: transform 0.2s; font-size: 10px; }
    .year-collapse-header.open .arrow { transform: rotate(180deg); }
    .year-collapse-body { display: none; padding-top: 6px; }
    .year-collapse-body.open { display: block; }

    .record-item { background: var(--bg-input); border: 1px solid var(--input-border); border-radius: 16px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .record-icon { font-size: 28px; }
    .record-main { flex: 1; }
    .record-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .record-name { font-weight: 700; font-size: 15px; cursor: pointer; color: var(--accent); }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
    .tag-relation { background: transparent; color: var(--tag-relation-text); border: 1px solid var(--tag-relation-text); }
    .tag-out { background: var(--tag-out-bg); color: var(--tag-out-text); }
    .tag-in { background: var(--tag-in-bg); color: var(--tag-in-text); }
    .record-amount { font-weight: 700; font-size: 16px; }
    .record-amount.out { color: var(--out-color); } .record-amount.in { color: var(--in-color); }
    .record-actions { display: flex; gap: 4px; }
    .record-edit, .record-delete { background: none; border: none; font-size: 16px; padding: 6px; border-radius: 50%; color: var(--text-muted); cursor: pointer; }
    .empty-state { text-align: center; padding: 40px 16px; color: var(--text-muted); font-size: 14px; }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .empty-action { margin-top: 12px; display: inline-block; padding: 8px 20px; border-radius: 14px; background: var(--accent); color: white; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }

    .actions-row { display: flex; gap: 10px; margin-top: 16px; }
    .btn-outline { flex: 1; background: var(--bg-input); border: 1px solid var(--input-border); padding: 10px; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-secondary); }
    .btn-danger { background: #fce8e6; border-color: #f5c6cb; color: #c92a2a; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-card { background: var(--bg-card); border-radius: 16px; padding: 14px 6px 10px; text-align: center; box-shadow: var(--shadow-sm); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-card.out .stat-value { color: var(--out-color); }
    .stat-card.in .stat-value { color: var(--in-color); }
    .stat-card.balance .stat-value { color: var(--text-primary); }

      function getPendingMaps() { const oweMe = {}; const iOwe = {}; records.forEach(r=>{ const n=r.name, amt=parseFloat(r.amount||0); if(r.type==='支出') { oweMe[n]=(oweMe[n]||0)+amt; } else { iOwe[r.name]=(iOwe[r.name]||0)+amt; } }); const finalOweMe = {}, finalIOwe = {}; Object.entries(oweMe).forEach(([n,v])=>{ const inAmt=iOwe[n]||0; if(v>inAmt) finalOweMe[n]=v-inAmt; }); Object.entries(iOwe).forEach(([n,v])=>{ const outAmt=oweMe[n]||0; if(v>outAmt) finalIOwe[n]=v-outAmt; }); return { finalOweMe, finalIOwe }; }

      function updateChart() { const canvas = document.getElementById('chartCanvas'); if (!canvas) return; const ctx=canvas.getContext('2d'); if(chartInstance){chartInstance.destroy();chartInstance=null;} const cr=getChartRecords(); if(!cr.length)return; const colors = getChartColors(); const trendHint = document.getElementById('trendHint'); if(trendHint) trendHint.style.display=(chartType==='trend')?'block':'none'; const clk=(t,v)=>{chartFilter={type:t,value:v};render();}; const bo={responsive:true,maintainAspectRatio:false,plugins:{}}; if(chartType==='trend'){ const y=new Date().getFullYear().toString(); const mo={}; for(let i=1;i<=12;i++)mo[i]={out:0,in:0}; cr.forEach(r=>{ if(r.type==='支出')mo[parseInt(r.date.split('-')[1])].out+=parseFloat(r.amount||0); else mo[parseInt(r.date.split('-')[1])].in+=parseFloat(r.amount||0); }); const lbs=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']; chartInstance=new Chart(ctx,{type:'line',data:{labels:lbs,datasets:[{label:'支出',data:Array.from({length:12},(_,i)=>mo[i+1].out),borderColor:colors[0],backgroundColor:colors[0]+'20'},{label:'收入',data:Array.from({length:12},(_,i)=>mo[i+1].in),borderColor:colors[3],backgroundColor:colors[3]+'20'}]},options:{...bo}}); } else if(chartType==='compare'){ const gk=chartDimension, og=aggregate(cr,gk,'支出'), ig=aggregate(cr,gk,'收入'), ks=[...new Set([...Object.keys(og),...Object.keys(ig)])].sort(); chartInstance=new Chart(ctx,{type:'bar',data:{labels:ks,datasets:[{label:'支出',data:ks.map(k=>og[k]||0),backgroundColor:colors[0]},{label:'收入',data:ks.map(k=>ig[k]||0),backgroundColor:colors[3]}]},options:{...bo,onClick:(e,el)=>{if(el.length>0)clk(gk,ks[el[0].index]);else{chartFilter=null;render();}}}}); } else { const tf=chartType==='out'?'支出':'收入', g=aggregate(cr,chartDimension,tf), lbs=Object.keys(g), dt=Object.values(g); if(!lbs.length)return; chartInstance=new Chart(ctx,{type:'pie',data:{labels:lbs,datasets:[{data:dt,backgroundColor:colors.slice(0,lbs.length)}]},options:{...bo,onCl       function updateReminders() { const { finalOweMe, finalIOwe } = getPendingMaps(); const oweMeCount=Object.keys(finalOweMe).length, iOweCount=Object.keys(finalIOwe).length; let html=''; if(oweMeCount>0&&!hiddenReminders.oweMe){ html+=`<div class="reminder-bar" data-type="oweMe"><span class="reminder-text">💡 有几份心意，还在路上</span><button class="close-reminder" data-type="oweMe">×</button></div>`; } if(iOweCount>0&&!hiddenReminders.iOwe){ html+=`<div class="reminder-bar" data-type="iOwe"><span class="reminder-text">💡 有几段故事，等你续写</span><button class="close-reminder" data-type="iOwe">×</button></div>`; } const container = document.getElementById('reminderContainerOverview'); if (container) container.innerHTML = html; document.querySelectorAll('.close-reminder').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const type=btn.dataset.type; hiddenReminders[type]=true; updateReminders(); }); }); document.querySelectorAll('.reminder-bar').forEach(bar=>{ bar.addEventListener('click',()=>{ const type=bar.dataset.type; if(type==='oweMe'){ pendingFilter='__pending_them__'; relationFilter=''; const rf=document.getElementById('relationFilter'); if(rf)rf.value=''; } else { pendingFilter='__pending_me__'; relationFilter=''; const rf=document.getElementById('relationFilter'); if(rf)rf.value=''; } chartFilter=null; updatePendingFilterUI(); switchPage('page-list'); render(); }); }); }

      function renderPersonSummary(name) { const container = document.getElementById('personSummary'); if (!container) return; const pr = records.filter(r => r.name === name); if (pr.length === 0) { container.innerHTML = ''; return; } const out = pr.filter(r => r.type === '支出').reduce((s, r) => s + parseFloat(r.amount || 0), 0); const inA = pr.filter(r => r.type === '收入').reduce((s, r) => s + parseFloat(r.amount || 0), 0); const net = inA - out; const latestDate = pr.reduce((max, r) => (r.date && r.date > max ? r.date : max), ''); const daysSince = latestDate ? Math.floor((Date.now() - new Date(latestDate).getTime()) / (1000 * 60 * 60 * 24)) : 9999; let summary = ''; if (daysSince > 180) { summary = '🌿 好久不见，不知道TA过得怎么样'; } else if (net > 0) { summary = '🌸 这段日子里，TA照顾你多一些'; } else if (net < 0) { summary = '🍵 这段日子里，你照顾TA多一些'; } else { summary = '🎋 来而往，情谊恰好平衡'; } container.innerHTML = summary; }
      function render() { const totalOut=records.filter(r=>r.type==='支出').reduce((s,r)=>s+parseFloat(r.amount||0),0); const totalIn=records.filter(r=>r.type==='收入').reduce((s,r)=>s+parseFloat(r.amount||0),0); const elOut=document.getElementById('totalOut'), elIn=document.getElementById('totalIn'), elBal=document.getElementById('totalBalance'); if(elOut)elOut.textContent='¥'+totalOut.toFixed(0); if(elIn)elIn.textContent='¥'+totalIn.toFixed(0); if(elBal)elBal.textContent=(totalIn-totalOut>=0?'¥':'-¥')+Math.abs(totalIn-totalOut).toFixed(0); updateRecentRecords(); updateReminders(); updateBackupHint(); renderDirectory(document.getElementById('directorySearchInput')?.value || ''); const listTitle=document.getElementById('listTitle'); const sortDateBtn=document.getElementById('sortDateBtn'); const sortAmountBtn=document.getElementById('sortAmountBtn'); const recordListEl=document.getElementById('recordList'); if (!listTitle || !recordListEl) return; const filtered=getFilteredRecordsForList(); let title='全部记录'; if(pendingFilter==='__pending_them__') title='心意待TA回应'; else if(pendingFilter==='__pending_me__') title='心意待我回应'; else if(relationFilter) title=relationFilter; if(chartFilter) title='筛选结果'; if(searchQuery.trim()) title='搜索结果'; listTitle.textContent=`${title} (${filtered.length})`; if(sortDateBtn){ sortDateBtn.classList.toggle('active',sortBy==='date'); sortDateBtn.textContent = sortBy==='date' ? '时间 ⏬' : '时间'; } if(sortAmountBtn){ sortAmountBtn.classList.toggle('active',sortBy==='amount'); sortAmountBtn.textContent = sortBy==='amount' ? '金额 ⏬' : '金额'; } const af=document.getElementById('activeFilter'); if(af){ if(chartFilter||pendingFilter){ let label=''; if(pendingFilter==='__pending_them__') label='心意待TA回应'; else if(pendingFilter==='__pending_me__') label='心意待我回应'; else label=`${chartFilter.type==='category'?'分类':'关系'}: ${chartFilter.value}`; af.innerHTML=`<span class="filter-tag">${label} <span class="clear-filter" id="clearChartFilter">×</span></span>`; const clearBtn=document.getElementById('clearChartFilter'); if(clearBtn) clearBtn.addEventListener('click',()=>{ chartFilter=null; pendingFilter=''; updatePendingFilterUI(); render(); }); } else af.innerHTML=''; } if(!filtered.length){ recordListEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>时光静静流淌，这里还是一片空白。<br><span class="empty-action" id="emptyGoRecord">记下第一笔吧</span></div>`; const btn = document.getElementById('emptyGoRecord'); if(btn) btn.addEventListener('click', ()=>switchPage('page-record')); } else { const yearBuckets = {}; filtered.forEach(r=>{ const y=(r.date||'').substring(0,4)||'未知年份'; if(!yearBuckets[y])yearBuckets[y]=[]; yearBuckets[y].push(r); }); const sortedYears = Object.keys(yearBuckets).sort((a,b)=>b.localeCompare(a)); const latestYear = sortedYears[0]; let html=''; sortedYears.forEach(year=>{ const isLatest = (year === latestYear); html+=`<div class="year-collapse"><div class="year-collapse-header${isLatest?' open':''}" data-year="${year}"><span>${year}年 (${yearBuckets[year].length}条)</span><span class="arrow">⌵</span></div><div class="year-collapse-body${isLatest?' open':''}" data-body="${year}">`; yearBuckets[year].forEach(r=>{ const idx=records.indexOf(r), isOut=r.type==='支出'; html+=`<div class="record-item"><div class="record-icon">${isOut?'💸':'💰'}</div><div class="record-main"><div class="record-name-row"><span class="record-name" data-person="${escHtml(r.name||'')}">${escHtml(r.name)}</span><span class="tag tag-relation">${escHtml(r.relation)}</span><span class="tag-type ${isOut?'tag-out':'tag-in'}">${escHtml(r.type)}</span></div><div class="record-meta">${r.date||''} · ${escHtml(r.category)}${r.note?' · '+escHtml(r.note):''}</div></div><div class="record-amount ${isOut?'out':'in'}">${isOut?'-':'+'}¥${parseFloat(r.amount||0).toFixed(0)}</div><div class="record-actions"><button class="record-edit" data-index="${idx}">✏️</button><button class="record-delete" data-index="${idx}">×</button></div></div>`; }); html+=`</div></div>`; }); recordListEl.innerHTML=html; document.querySelectorAll('.year-collapse-header').forEach(header=>header.addEventListener('click',()=>{ const year=header.dataset.year; const body=document.querySelector(`.year-collapse-body[data-body="${year}"]`); header.classList.toggle('open'); if(body) body.classList.toggle('open'); })); document.querySelectorAll('.record-delete').forEach(b=>b.addEventListener('click',async()=>{ const idx=parseInt(b.dataset.index); if(await showConfirm('真的要让它从时光里消失吗？',true)){ records.splice(idx,1); saveRecords(); updateYearSelect(); render(); updateChart(); } })); document.querySelectorAll('.record-edit').forEach(b=>b.addEventListener('click',()=>openEditModal(parseInt(b.dataset.index)))); document.querySelectorAll('.record-name').forEach(b=>b.addEventListener('click',()=>openPersonModal(b.dataset.person))); } updateYearSelect(); updatePendingFilterUI(); }
      function escHtml(t){ const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g,c=>m[c]); }
      function addRecord(){ const name=document.getElementById('inputName').value.trim(), amount=document.getElementById('inputAmount').value.trim(); if(!name||!amount){ alert('请至少填写姓名和金额'); return; } const date=document.getElementById('inputDate').value||new Date().toISOString().slice(0,10); records.push({ type: currentType, relation: document.getElementById('inputRelation').value||'其他', name, amount: parseFloat(amount), category: document.getElementById('inputCategory').value||'其他', date, note: document.getElementById('inputNote').value.trim() }); saveRecords(); render(); updateChart(); document.getElementById('inputName').value=''; document.getElementById('inputAmount').value=''; document.getElementById('inputNote').value=''; hideSuggest(); document.getElementById('advancedFields').classList.remove('show'); document.getElementById('btnExpandMore').textContent='展开更多选项 ⌵'; switchPage('page-list'); }
      function getUniqueNames(){ const m=new Map(); [...records].reverse().forEach(r=>{ if(!m.has(r.name))m.set(r.name,{relation:r.relation,category:r.category}); }); return m; }
      function showSuggest(filter=''){ const l=document.getElementById('suggestList'); const names=getUniqueNames(); if(names.size===0){l.classList.remove('show');return;} let f=[...names].filter(([n])=>n.includes(filter)); if(!f.length){l.classList.remove('show');return;} l.innerHTML=f.map(([n,i])=>`<div class="suggest-item" data-name="${escHtml(n)}" data-relation="${escHtml(i.relation)}" data-category="${escHtml(i.category)}"><span>${escHtml(n)}</span><span class="suggest-relation">${escHtml(i.relation)} · ${escHtml(i.category)}</span></div>`).join(''); l.classList.add('show'); }
      function hideSuggest(){ const l=document.getElementById('suggestList'); if(l)l.classList.remove('show'); }
      function selectSuggest(n,r,c){ document.getElementById('inputName').value=n; document.getElementById('inputRelation').value=r; document.getElementById('inputCategory').value=c; hideSuggest(); document.getElementById('inputAmount').focus(); }
      function openEditModal(index){ const r=records[index]; if(!r)return; editIndex=index; const editType=document.getElementById('editType'); editType.innerHTML='<option value="支出">支出</option><option value="收入">收入</option>'; editType.value=r.type; document.getElementById('editName').value=r.name; document.getElementById('editAmount').value=r.amount; document.getElementById('editDate').value=r.date; document.getElementById('editNote').value=r.note||''; populateSelect('editCategory',getAllCategories(),r.category); populateSelect('editRelation',getAllRelations(),r.relation); document.getElementById('editModal').classList.add('active'); }
      function closeEditModal(){ document.getElementById('editModal').classList.remove('active'); editIndex=-1; }
      async function saveEdit(){ if(editIndex<0)return; const name=document.getElementById('editName').value.trim(), amount=document.getElementById('editAmount').value.trim(), date=document.getElementById('editDate').value; if(!name||!amount||!date){ alert('请填写完整'); return; } const newRelation=document.getElementById('editRelation').value; const oldRelation=records[editIndex].relation; records[editIndex]={ type:document.getElementById('editType').value, relation:newRelation, name, amount:parseFloat(amount), category:document.getElementById('editCategory').value, date, note:document.getElementById('editNote').value.trim() }; if(newRelation!==oldRelation){ const sameNameRecords=records.filter((r,i)=>r.name===name&&i!==editIndex); if(sameNameRecords.length>0){ const shouldSync=await showConfirm(`是否将关系"${newRelation}"同步到"${name}"的全部 ${sameNameRecords.length} 条记录？`); if(shouldSync){ records.forEach(r=>{ if(r.name===name)r.relation=newRelation; }); } } } saveRecords(); render(); updateChart(); closeEditModal(); }
      function openPersonModal(name){ const pr=records.filter(r=>r.name===name); if(!pr.length)return; currentPersonName=name; const out=pr.filter(r=>r.type==='支出').reduce((s,r)=>s+parseFloat(r.amount||0),0); const inA=pr.filter(r=>r.type==='收入').reduce((s,r)=>s+parseFloat(r.amount||0),0); document.getElementById('personTitle').textContent=`👤 ${name}`; document.getElementById('personOut').textContent='¥'+out.toFixed(0); document.getElementById('personIn').textContent='¥'+inA.toFixed(0); document.getElementById('personBalance').textContent=(inA-out>=0?'¥':'-¥')+Math.abs(inA-out).toFixed(0); populateSelect('personNewRelation',getAllRelations(),pr[0]?.relation||'其他'); document.getElementById('personRecords').innerHTML=[...pr].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(r=>`<div class="mini-record"><div><strong>${r.date}</strong> · ${r.category} ${r.note?escHtml(r.note):''}</div><div style="color:${r.type==='支出'?'var(--out-color)':'var(--in-color)'};font-weight:700;">${r.type==='支出'?'-':'+'}¥${parseFloat(r.amount||0).toFixed(0)}</div></div>`).join(''); document.getElementById('personModal').classList.add('active'); renderPersonSummary(name); }
      function updatePersonRelation(){ if(!currentPersonName)return; const nr=document.getElementById('personNewRelation').value; records.forEach(r=>{if(r.name===currentPersonName)r.relation=nr;}); saveRecords(); render(); updateChart(); openPersonModal(currentPersonName); }
      async function clearAllData(){ if(await showConfirm('确定要清空所有记录吗？',true)){ records=[]; saveRecords(); render(); updateChart(); } }
      function exportCSV(){ if(!records.length){alert('无数据');return;} const h='类型,关系,姓名,金额,分类,日期,备注'; const ls=records.map(r=>[r.type,r.relation,r.name,r.amount,r.category,r.date,r.note||''].map(f=>String(f).includes(',')||String(f).includes('"')?'"'+String(f).replace(/"/g,'""')+'"':f).join(',')); const csv='\uFEFF'+h+'\n'+ls.join('\n'); const b=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='礼尚往来_'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); localStorage.setItem(BACKUP_LAST_EXPORT_KEY, Date.now().toString()); updateBackupHint(); }
      async function importCSV(file){ const r=new FileReader(); r.onload=async e=>{ let t=e.target.result; if(t.charCodeAt(0)===0xFEFF)t=t.slice(1); const ls=[]; let cl='',iq=false; for(let i=0;i<t.length;i++){ const ch=t[i]; if(ch==='"'){ if(iq&&t[i+1]==='"'){cl+='""';i++;continue;} iq=!iq;cl+=ch; } else if(ch==='\n'&&!iq){ls.push(cl);cl='';} else if(ch==='\r'&&!iq){ if(t[i+1]==='\n'){ls.push(cl);cl='';i++;} else{ls.push(cl);cl='';} } else cl+=ch; } if(cl.trim()!=='')ls.push(cl); if(ls.length<2){alert('文件为空或格式错误');return;} const hd=ls[0]; const hs=hd.split(',').map(h=>h.trim()); const idx={}; hs.forEach((h,i)=>{if(h)idx[h]=i;}); const nr=[]; for(let i=1;i<ls.length;i++){ const line=ls[i]; if(!line.trim())continue; const f=parseCSVLine(line); let t,r,n,a,c,d,no; if(Object.keys(idx).length>=6){ n=f[idx['姓名']]||f[idx['对方姓名']]||''; a=f[idx['金额']]||''; d=f[idx['日期']]||''; t=f[idx['类型']]||'支出'; r=f[idx['关系']]||'其他'; c=f[idx['分类']]||'其他'; no=f[idx['备注']]||''; } else { if(f.length<6)continue; t=f[0]||'支出'; r=f[1]||'其他'; n=f[2]||''; a=f[3]||''; c=f[4]||'其他'; d=f[5]||''; no=f[6]||''; } if(!n||!a||!d)continue; const am=parseFloat(a); if(isNaN(am))continue; if(!/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(d.trim()))continue; nr.push({type:t||'支出',relation:r||'其他',name:n.trim(),amount:am,category:c||'其他',date:d.trim(),note:no?no.trim():''}); } if(!nr.length){alert('无有效记录');return;} const merge=await showConfirm(`导入 ${nr.length} 条记录？\n确定合并，取消覆盖现有数据`); if(merge){records=records.concat(nr);}else{records=nr;} saveRecords();render();updateChart();alert('导入成功'); }; r.readAsText(file,'UTF-8'); }
      function parseCSVLine(line){ const f=[]; let c='',iq=false; for(let i=0;i<line.length;i++){ const ch=line[i]; if(iq){if(ch==='"'){if(line[i+1]==='"'){c+='"';i++;}else iq=false;}else c+=ch;} else{if(ch==='"')iq=true;else if(ch===','){f.push(c);c='';}else c+=ch;} } f.push(c); return f; }
      function switchPage(pageId) { document.querySelectorAll('.page-content').forEach(p => { p.classList.remove('active'); p.style.opacity = '0'; p.style.transform = 'translateY(8px)'; }); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); const page = document.getElementById(pageId); if (page) { page.classList.add('active'); requestAnimationFrame(() => { page.style.opacity = '1'; page.style.transform = 'translateY(0)'; }); } const tab = document.querySelector(`.tab-btn[data-page="${pageId}"]`); if (tab) tab.classList.add('active'); if (pageId === 'page-overview') { updateYearSelect(); updateChart(); } if (pageId === 'page-directory') { renderDirectory(document.getElementById('directorySearchInput')?.value || ''); } updateBackToTopVisibility(); }
      function updateBackToTopVisibility() { const btn = document.getElementById('backToTopBtn'); if (!btn) return; const activePage = document.querySelector('.page-content.active'); if (!activePage) { btn.classList.remove('show'); return; } const pageId = activePage.id; if (pageId === 'page-list' || pageId === 'page-overview') { if (activePage.scrollTop > 300 || document.documentElement.scrollTop > 300) { btn.classList.add('show'); } else { btn.classList.remove('show'); } } else { btn.classList.remove('show'); } }
      function loadTheme(){ currentTheme=localStorage.getItem('appTheme')||'light'; lastLightTheme=localStorage.getItem('lastLightTheme')||'light'; applyTheme(); }
      function applyTheme(){ document.body.setAttribute('data-theme',currentTheme); const tt=document.getElementById('themeToggle'); if(tt)tt.textContent=darkThemes.includes(currentTheme)?'🌙':'☀️'; document.querySelectorAll('.style-option').forEach(o=>o.classList.toggle('active',o.dataset.theme===currentTheme)); }
      function toggleDarkMode(){ if(darkThemes.includes(currentTheme)){currentTheme=lastLightTheme;}else{lastLightTheme=currentTheme;currentTheme='dark';} applyTheme(); updateChart(); }
      function setTheme(t){ if(!allThemes.includes(t)||darkThemes.includes(t))return; currentTheme=t; lastLightTheme=t; applyTheme(); document.getElementById('stylePanel').classList.remove('show'); updateChart(); }
      function renderTagManager(){ const cc=document.getElementById('categoryTags'), rc=document.getElementById('relationTags'); const allC=getAllCategories(), allR=getAllRelations(); cc.innerHTML=allC.map(c=>{ const isDefault=defaultCategories.includes(c); return `<span class="tag-manage-item" style="background:${isDefault?'#eee':'#dce9f0'};">${c}${!isDefault?`<button class="del-tag" data-cat="${c}">×</button>`:''}</span>`; }).join(''); rc.innerHTML=allR.map(r=>{ const isDefault=defaultRelations.includes(r); return `<span class="tag-manage-item" style="background:${isDefault?'#eee':'#dce9f0'};">${r}${!isDefault?`<button class="del-tag" data-rel="${r}">×</button>`:''}</span>`; }).join(''); }
      function addCustomCategory(){ const v=document.getElementById('newCategory').value.trim(); if(!v)return; if(!customCategories.includes(v))customCategories.push(v); saveSettings();refreshTagSelectors();renderTagManager(); document.getElementById('newCategory').value=''; }

        document.querySelectorAll('.type-switch-btn').forEach(b=>b.addEventListener('click',()=>{currentType=b.dataset.type;document.querySelectorAll('.type-switch-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');}));
        document.getElementById('dimTabs').addEventListener('click',e=>{if(e.target.classList.contains('chart-dim-tab')){chartDimension=e.target.dataset.dim;chartFilter=null;document.querySelectorAll('.chart-dim-tab').forEach(t=>t.classList.toggle('active',t.dataset.dim===chartDimension));updateChart();render();}});
        document.querySelector('.chart-type-tabs').addEventListener('click',e=>{if(e.target.classList.contains('chart-type-tab')){chartType=e.target.dataset.type;chartFilter=null;document.querySelectorAll('.chart-type-tab').forEach(t=>t.classList.toggle('active',t.dataset.type===chartType));updateChart();render();}});
        document.getElementById('chartYear').addEventListener('change',e=>{chartYear=e.target.value;chartFilter=null;updateChart();render();});
        const nm=document.getElementById('inputName'); nm.addEventListener('input',()=>showSuggest(nm.value.trim())); nm.addEventListener('focus',()=>showSuggest(nm.value.trim())); nm.addEventListener('blur',()=>setTimeout(hideSuggest,150));
        document.getElementById('suggestList').addEventListener('mousedown',e=>{e.preventDefault();const i=e.target.closest('.suggest-item');if(i)selectSuggest(i.dataset.name,i.dataset.relation,i.dataset.category);});

        document.getElementById('cancelEdit').addEventListener('click',closeEditModal); document.getElementById('saveEdit').addEventListener('click',saveEdit); document.getElementById('editModal').addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))closeEditModal();});
        document.getElementById('closePersonBtn').addEventListener('click',()=>{document.getElementById('personModal').classList.remove('active');currentPersonName='';});
        document.getElementById('personModal').addEventListener('click',e=>{if(e.target===document.getElementById('personModal')){document.getElementById('personModal').classList.remove('active');currentPersonName='';}});
        document.getElementById('updatePersonRelation').addEventListener('click',updatePersonRelation);
        document.getElementById('manageTagsBtn').addEventListener('click',()=>{renderTagManager();document.getElementById('tagsModal').classList.add('active');});
        document.getElementById('closeTagsBtn').addEventListener('click',()=>document.getElementById('tagsModal').classList.remove('active'));
        document.getElementById('tagsModal').addEventListener('click',e=>{if(e.target===document.getElementById('tagsModal'))document.getElementById('tagsModal').classList.remove('active');});
        document.getElementById('addCategoryBtn').addEventListener('click',addCustomCategory); document.getElementById('addRelationBtn').addEventListener('click',addCustomRelation);
        document.getElementById('resetTagsBtn').addEventListener('click',resetTags);
        document.getElementById('categoryTags').addEventListener('click',e=>{ if(e.target.classList.contains('del-tag')){ customCategories=customCategories.filter(c=>c!==e.target.dataset.cat); saveSettings();refreshTagSelectors();renderTagManager(); render(); updateChart(); } });
        document.getElementById('relationTags').addEventListener('click',e=>{ if(e.target.classList.contains('del-tag')){ customRelations=customRelations.filter(r=>r!==e.target.dataset.rel); saveSettings();refreshTagSelectors();renderTagManager(); render(); updateChart(); } });
        document.getElementById('relationFilter').addEventListener('change',e=>{ relationFilter=e.target.value; pendingFilter=''; chartFilter=null; updatePendingFilterUI(); render(); });
        document.getElementById('pendingFilterBtn').addEventListener('click',(e)=>{ e.stopPropagation(); if(pendingFilter){ pendingFilter=''; relationFilter=''; document.getElementById('relationFilter').value=''; chartFilter=null; render(); } else { document.getElementById('pendingFilterDropdown').classList.toggle('show'); } });
        document.getElementById('pendingFilterDropdown').addEventListener('click',(e)=>{ if(e.target.classList.contains('filter-dropdown-item')){ pendingFilter=e.target.dataset.filter; relationFilter=''; document.getElementById('relationFilter').value=''; chartFilter=null; render(); } });
        document.addEventListener('click',(e)=>{ const dd=document.getElementById('pendingFilterDropdown'); const btn=document.getElementById('pendingFilterBtn'); if(!dd.contains(e.target)&&e.target!==btn){ dd.classList.remove('show'); } });
        document.getElementById('sortDateBtn').addEventListener('click',()=>{sortBy='date';render();});
        document.getElementById('sortAmountBtn').addEventListener('click',()=>{sortBy='amount';render();});

        document.getElementById('backToTopBtn').addEventListener('click', () => { const activePage = document.querySelector('.page-content.active'); if (activePage) activePage.scrollTo({ top: 0, behavior: 'smooth' }); document.documentElement.scrollTo({ top: 0, behavior: 'smooth' }); });
        document.addEventListener('scroll', updateBackToTopVisibility);
        document.querySelectorAll('.page-content').forEach(page => page.addEventListener('scroll', updateBackToTopVisibility));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchPage(btn.dataset.page)));
        setTimeout(() => { updateYearSelect(); updateChart(); }, 100);
      });
    })();
  </script>
